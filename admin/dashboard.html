<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Dancing+Script:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --gold: #c9a84c;
        --gold-light: #f0d080;
        --gold-dark: #8b6914;
        --midnight: #0d0820;
        --deep-navy: #1a1230;
        --panel: #1e1535;
        --panel-light: #2a1f4a;
        --text: #f0e6d0;
        --text-muted: rgba(240, 230, 208, 0.5);
        --border: rgba(201, 168, 76, 0.2);
        --danger: #e07070;
      }

      body {
        min-height: 100vh;
        background: var(--midnight);
        font-family: "Cormorant Garamond", serif;
        color: var(--text);
      }

      /* ── Navbar ── */
      nav {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .nav-brand {
        font-family: "Dancing Script", cursive;
        font-size: 22px;
        color: var(--gold);
      }
      .nav-user {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 14px;
        color: var(--text-muted);
      }
      .btn-logout {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        padding: 6px 14px;
        font-family: "Cormorant Garamond", serif;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-logout:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ── Layout ── */
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      /* ── Section header ── */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.05em;
      }

      /* ── Buttons ── */
      .btn-primary {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold));
        border: none;
        border-radius: 8px;
        color: var(--midnight);
        font-family: "Cormorant Garamond", serif;
        font-size: 15px;
        font-weight: 600;
        padding: 10px 22px;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .btn-ghost {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: "Cormorant Garamond", serif;
        font-size: 14px;
        padding: 7px 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-ghost:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .btn-danger {
        background: none;
        border: 1px solid rgba(224, 112, 112, 0.3);
        border-radius: 6px;
        color: var(--danger);
        font-family: "Cormorant Garamond", serif;
        font-size: 13px;
        padding: 6px 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-danger:hover {
        background: rgba(224, 112, 112, 0.1);
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 8, 32, 0.9);
        backdrop-filter: blur(6px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        width: min(560px, 100%);
        max-height: 90vh;
        overflow-y: auto;
        scrollbar-width: none;
        padding: 36px 32px;
        transform: translateY(20px);
        transition: transform 0.25s;
      }
      .modal-overlay.open .modal {
        transform: translateY(0);
      }

      .modal-title {
        font-family: "Dancing Script", cursive;
        font-size: 26px;
        color: var(--gold);
        margin-bottom: 24px;
      }

      .modal-footer {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }

      /* ── Delete Confirm Modal ── */
      #deleteOverlay .modal {
        width: min(400px, 100%);
        padding: 32px 28px;
        text-align: center;
      }
      .delete-icon {
        font-size: 40px;
        margin-bottom: 16px;
      }
      .delete-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
      }
      .delete-subtitle {
        font-size: 14px;
        color: rgba(201, 168, 76, 0.6);
        margin-bottom: 28px;
        line-height: 1.5;
      }
      #deleteOverlay .modal-footer {
        justify-content: center;
        border-top: none;
        margin-top: 0;
        padding-top: 0;
      }

      /* ── Form ── */
      .form-group {
        margin-bottom: 18px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.7);
        margin-bottom: 8px;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px 14px;
        color: var(--text);
        font-family: "Cormorant Garamond", serif;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
        resize: vertical;
      }
      .form-group input:focus,
      .form-group textarea:focus {
        border-color: rgba(201, 168, 76, 0.6);
      }

      /* Photo upload */
      .photo-upload-area {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s;
        position: relative;
      }
      .photo-upload-area:hover {
        border-color: var(--gold);
      }
      .photo-upload-area input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        background: none;
      }
      .photo-preview {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--gold);
        margin: 0 auto 8px;
        display: none;
      }
      .photo-upload-hint {
        font-size: 14px;
        color: var(--text-muted);
      }

      /* Wishes editor */
      .wishes-editor {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .wish-row {
        display: grid;
        grid-template-columns: 48px 1fr auto;
        gap: 8px;
        align-items: center;
      }
      .wish-row input {
        margin: 0;
      }
      .btn-remove-wish {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        transition: color 0.2s;
      }
      .btn-remove-wish:hover {
        color: var(--danger);
      }
      .btn-add-wish {
        background: none;
        border: 1px dashed var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: "Cormorant Garamond", serif;
        font-size: 14px;
        padding: 8px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
      }
      .btn-add-wish:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      /* ── Cards list ── */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .card-item {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        transition: border-color 0.2s;
      }
      .card-item:hover {
        border-color: rgba(201, 168, 76, 0.4);
      }

      .card-item-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }
      .card-item-photo {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--gold);
        flex-shrink: 0;
      }
      .card-item-photo-placeholder {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--panel-light);
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .card-item-name {
        font-family: "Dancing Script", cursive;
        font-size: 20px;
        color: var(--gold);
      }
      .card-item-date {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .card-item-link {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        margin-bottom: 14px;
        font-size: 13px;
        color: var(--text-muted);
        word-break: break-all;
      }
      .card-item-link span {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .btn-copy {
        background: none;
        border: none;
        color: var(--gold);
        cursor: pointer;
        font-size: 16px;
        padding: 0 4px;
        flex-shrink: 0;
        transition: opacity 0.2s;
      }
      .btn-copy:hover {
        opacity: 0.7;
      }

      .card-item-actions {
        display: flex;
        gap: 8px;
      }

      .badge {
        display: inline-block;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 4px;
        margin-bottom: 12px;
      }
      .badge-public {
        background: rgba(168, 216, 200, 0.15);
        color: #a8d8c8;
        border: 1px solid rgba(168, 216, 200, 0.3);
      }
      .badge-draft {
        background: rgba(201, 168, 76, 0.1);
        color: var(--gold);
        border: 1px solid var(--border);
      }

      /* ── Empty state ── */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        font-size: 16px;
        font-style: italic;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--panel-light);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 20px;
        font-size: 14px;
        color: var(--text);
        z-index: 999;
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      /* ── Status message ── */
      .status-msg {
        font-size: 13px;
        color: var(--danger);
        margin-top: 12px;
        text-align: center;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-brand">✦ Matzy Bday</div>
      <div class="nav-user">
        <button class="btn-logout" id="btnLogout">Keluar</button>
      </div>
    </nav>

    <div class="container">
      <div class="section-header">
        <div class="section-title">Kartu Ucapan</div>
        <button class="btn-primary" id="btnNewCard">+ Buat Kartu</button>
      </div>

      <div class="cards-grid" id="cardsGrid">
        <div class="empty-state">Memuat kartu...</div>
      </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title" id="modalTitle">Buat Kartu Baru</div>

        <form id="cardForm">
          <div class="form-group">
            <label>Foto Profil</label>
            <div class="photo-upload-area" id="photoUploadArea">
              <input type="file" id="photoInput" accept="image/*" />
              <img class="photo-preview" id="photoPreview" alt="preview" />
              <div class="photo-upload-hint" id="photoHint">
                🖼 Klik untuk upload foto
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Nama Penerima</label>
            <input
              type="text"
              id="fieldName"
              placeholder="Nama lengkap"
              required
            />
          </div>

          <div class="form-group">
            <label>Subjudul (halaman depan)</label>
            <input
              type="text"
              id="fieldSubtitle"
              placeholder="Semoga hari ulang tahunmu..."
            />
          </div>

          <div class="form-group">
            <label>Pesan</label>
            <textarea
              id="fieldMessage"
              rows="5"
              placeholder="Tulis pesan di sini..."
            ></textarea>
          </div>

          <div class="form-group">
            <label>Tanda Tangan</label>
            <input type="text" id="fieldSignature" placeholder="Dari: ..." />
          </div>

          <div class="form-group">
            <label>Email Penerima</label>
            <input type="email" id="fieldEmail" placeholder="email@contoh.com" />
          </div>

          <div class="form-group">
            <label>Jadwal Publikasi Otomatis</label>
            <input type="datetime-local" id="fieldScheduledAt" />
            <small style="color:rgba(201,168,76,0.5);font-size:12px;">Kosongkan jika ingin publish manual</small>
          </div>

          <div class="form-group">
            <label>Wishes (ikon + teks)</label>
            <div class="wishes-editor" id="wishesEditor"></div>
            <button type="button" class="btn-add-wish" id="btnAddWish">
              + Tambah wish
            </button>
          </div>

          <div class="status-msg" id="formStatus"></div>
        </form>

        <div class="modal-footer">
          <button class="btn-ghost" id="btnCancel">Batal</button>
          <button class="btn-primary" id="btnSave">Simpan</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="deleteOverlay">
      <div class="modal">
        <div class="delete-icon">🗑️</div>
        <div class="delete-title">Hapus Kartu?</div>
        <div class="delete-subtitle" id="deleteSubtitle"></div>
        <div class="modal-footer">
          <button class="btn-ghost" id="btnDeleteCancel">Batal</button>
          <button class="btn-primary" id="btnDeleteConfirm" style="background:rgba(224,112,112,0.15);color:#e07070;border:1px solid rgba(224,112,112,0.3);">Hapus</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "../js/firebase.js";
      import {
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
      import {
        collection,
        addDoc,
        getDocs,
        doc,
        updateDoc,
        deleteDoc,
        serverTimestamp,
        Timestamp,
      } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";
      import { uploadPhoto } from "../js/cloudinary.js";

      // ── Auth guard ──
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "/";
          return;
        }
        loadCards();
      });

      document
        .getElementById("btnLogout")
        .addEventListener("click", () => signOut(auth));

      // ── Toast ──
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      // ── Slug generator ──
      function generateSlug() {
        return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
      }

      // ── Wishes editor ──
      const DEFAULT_WISHES = [
        { icon: "💛", text: "Kebahagiaan Abadi" },
        { icon: "🌸", text: "Kesehatan Prima" },
        { icon: "⭐", text: "Impian Tercapai" },
        { icon: "🍀", text: "Keberuntungan" },
        { icon: "🎯", text: "Sukses Selalu" },
        { icon: "💫", text: "Cinta & Kasih" },
      ];

      function renderWishes(wishes) {
        const editor = document.getElementById("wishesEditor");
        editor.innerHTML = "";
        wishes.forEach((w, i) => {
          const row = document.createElement("div");
          row.className = "wish-row";
          row.innerHTML = `
            <input type="text" value="${w.icon}" placeholder="🎁" maxlength="2" />
            <input type="text" value="${w.text}" placeholder="Teks wish" />
            <button type="button" class="btn-remove-wish" data-i="${i}">×</button>
          `;
          editor.appendChild(row);
        });
      }

      function getWishes() {
        return [...document.querySelectorAll("#wishesEditor .wish-row")].map(
          (row) => {
            const inputs = row.querySelectorAll("input");
            return { icon: inputs[0].value, text: inputs[1].value };
          },
        );
      }

      document.getElementById("btnAddWish").addEventListener("click", () => {
        renderWishes([...getWishes(), { icon: "✨", text: "" }]);
      });

      document.getElementById("wishesEditor").addEventListener("click", (e) => {
        if (e.target.classList.contains("btn-remove-wish")) {
          const wishes = getWishes();
          wishes.splice(+e.target.dataset.i, 1);
          renderWishes(wishes);
        }
      });

      // ── Photo preview ──
      let pendingPhotoFile = null;
      document.getElementById("photoInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        pendingPhotoFile = file;
        const preview = document.getElementById("photoPreview");
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        document.getElementById("photoHint").style.display = "none";
      });

      // ── Modal state ──
      let editingId = null;
      let currentPhotoUrl = null;

      function openModal(card = null) {
        editingId = card?.id ?? null;
        currentPhotoUrl = card?.photoUrl ?? null;
        pendingPhotoFile = null;

        document.getElementById("modalTitle").textContent = card
          ? "Edit Kartu"
          : "Buat Kartu Baru";
        document.getElementById("fieldName").value = card?.name ?? "";
        document.getElementById("fieldSubtitle").value =
          card?.subtitle ?? "Semoga Hari Ulang Tahunmu Penuh Keberuntungan!";
        document.getElementById("fieldMessage").value = card?.message ?? "";
        document.getElementById("fieldSignature").value = card?.signature ?? "";
        document.getElementById("fieldEmail").value = card?.recipientEmail ?? "";
        document.getElementById("fieldScheduledAt").value = card?.scheduledAt
          ? new Date(card.scheduledAt.toMillis()).toISOString().slice(0, 16)
          : "";
        document.getElementById("formStatus").textContent = "";

        const preview = document.getElementById("photoPreview");
        if (card?.photoUrl) {
          preview.src = card.photoUrl;
          preview.style.display = "block";
          document.getElementById("photoHint").style.display = "none";
        } else {
          preview.style.display = "none";
          document.getElementById("photoHint").style.display = "block";
        }

        renderWishes(card?.wishes ?? DEFAULT_WISHES);
        document.getElementById("modalOverlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
        editingId = null;
      }

      // ── Delete confirm modal ──
      let deletePendingId = null;

      function confirmDelete(id, name) {
        deletePendingId = id;
        document.getElementById("deleteSubtitle").textContent =
          `Kartu untuk "${name}" akan dihapus permanen dan tidak bisa dikembalikan.`;
        document.getElementById("deleteOverlay").classList.add("open");
      }

      document.getElementById("btnDeleteCancel").addEventListener("click", () => {
        document.getElementById("deleteOverlay").classList.remove("open");
        deletePendingId = null;
      });
      document.getElementById("deleteOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) {
          document.getElementById("deleteOverlay").classList.remove("open");
          deletePendingId = null;
        }
      });
      document.getElementById("btnDeleteConfirm").addEventListener("click", async () => {
        if (!deletePendingId) return;
        await deleteDoc(doc(db, "cards", deletePendingId));
        document.getElementById("deleteOverlay").classList.remove("open");
        deletePendingId = null;
        showToast("Kartu dihapus");
        loadCards();
      });

      document
        .getElementById("btnNewCard")
        .addEventListener("click", () => openModal());
      document
        .getElementById("btnCancel")
        .addEventListener("click", closeModal);
      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      // ── Save card ──
      document.getElementById("btnSave").addEventListener("click", async () => {
        const btn = document.getElementById("btnSave");
        const status = document.getElementById("formStatus");
        const name = document.getElementById("fieldName").value.trim();
        if (!name) {
          status.textContent = "Nama penerima wajib diisi.";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Menyimpan...";
        status.textContent = "";

        try {
          // Upload foto jika ada file baru
          let photoUrl = currentPhotoUrl;
          if (pendingPhotoFile) {
            status.textContent = "Mengupload foto...";
            photoUrl = await uploadPhoto(pendingPhotoFile);
          }

          const scheduledAtVal = document.getElementById("fieldScheduledAt").value;
          const data = {
            name,
            subtitle: document.getElementById("fieldSubtitle").value.trim(),
            message: document.getElementById("fieldMessage").value.trim(),
            signature: document.getElementById("fieldSignature").value.trim(),
            recipientEmail: document.getElementById("fieldEmail").value.trim(),
            scheduledAt: scheduledAtVal ? Timestamp.fromDate(new Date(scheduledAtVal)) : null,
            wishes: getWishes(),
            photoUrl: photoUrl ?? "",
            updatedAt: serverTimestamp(),
          };

          if (editingId) {
            await updateDoc(doc(db, "cards", editingId), data);
            showToast("Kartu berhasil diperbarui ✓");
          } else {
            await addDoc(collection(db, "cards"), {
              ...data,
              slug: generateSlug(),
              isPublic: false,
              createdAt: serverTimestamp(),
            });
            showToast("Kartu berhasil dibuat ✓");
          }

          closeModal();
          loadCards();
        } catch (err) {
          status.textContent = "Gagal menyimpan: " + err.message;
        } finally {
          btn.disabled = false;
          btn.textContent = "Simpan";
        }
      });

      // ── Load & render cards ──
      async function loadCards() {
        const grid = document.getElementById("cardsGrid");
        grid.innerHTML = '<div class="empty-state">Memuat...</div>';

        try {
          const snap = await getDocs(collection(db, "cards"));

          if (snap.empty) {
            grid.innerHTML =
              '<div class="empty-state">Belum ada kartu. Buat yang pertama!</div>';
            return;
          }

          const cards = [];
          snap.forEach((docSnap) =>
            cards.push({ id: docSnap.id, ...docSnap.data() }),
          );
          cards.sort(
            (a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0),
          );

          grid.innerHTML = "";
          cards.forEach((c) => grid.appendChild(renderCardItem(c)));
        } catch (err) {
          grid.innerHTML = `<div class="empty-state" style="color:#e07070">Error: ${err.message}</div>`;
        }
      }

      function renderCardItem(c) {
        const origin = window.location.origin;
        const publicUrl = `${origin}/card?id=${c.slug}`;
        const date =
          c.createdAt?.toDate().toLocaleDateString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric",
          }) ?? "—";

        const el = document.createElement("div");
        el.className = "card-item";
        el.innerHTML = `
          <div class="card-item-header">
            ${
              c.photoUrl
                ? `<img class="card-item-photo" src="${c.photoUrl}" alt="${c.name}" />`
                : `<div class="card-item-photo-placeholder">🎂</div>`
            }
            <div>
              <div class="card-item-name">${c.name}</div>
              <div class="card-item-date">${date}</div>
            </div>
          </div>
          <div class="badge ${c.isPublic ? "badge-public" : "badge-draft"}">${c.isPublic ? "Public" : "Draft"}</div>
          <div class="card-item-link">
            ${c.isPublic ? `<span>${publicUrl}</span><button class="btn-copy" title="Salin link" data-url="${publicUrl}">⎘</button>` : `<span>&nbsp;</span>`}
          </div>
          <div class="card-item-actions">
            <button class="btn-ghost btn-edit" data-id="${c.id}">Edit</button>
            <button class="btn-ghost btn-toggle" data-id="${c.id}" data-public="${c.isPublic}">
              ${c.isPublic ? "Sembunyikan" : "Publikasikan"}
            </button>
            <button class="btn-danger btn-delete" data-id="${c.id}">Hapus</button>
          </div>
        `;

        // Copy link
        el.querySelector(".btn-copy")?.addEventListener("click", (e) => {
          navigator.clipboard.writeText(e.currentTarget.dataset.url);
          showToast("Link disalin ✓");
        });

        // Edit
        el.querySelector(".btn-edit").addEventListener("click", async () => {
          const snap = await getDocs(collection(db, "cards"));
          const found = snap.docs.find((d) => d.id === c.id);
          if (found) openModal({ id: found.id, ...found.data() });
        });

        // Toggle public
        el.querySelector(".btn-toggle").addEventListener("click", async (e) => {
          const isPublic = e.currentTarget.dataset.public === "true";
          await updateDoc(doc(db, "cards", c.id), { isPublic: !isPublic });
          showToast(
            isPublic ? "Kartu disembunyikan" : "Kartu dipublikasikan ✓",
          );
          loadCards();
        });

        // Delete
        el.querySelector(".btn-delete").addEventListener("click", () => {
          confirmDelete(c.id, c.name);
        });

        return el;
      }
    </script>
  </body>
</html>
